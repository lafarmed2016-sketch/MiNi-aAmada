<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿A dónde iré con mi niña bonita?</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2d0a0a, #4a0e2e, #1a0520);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            padding: 20px 15px;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        .hearts-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            animation: floatHeart linear infinite;
            opacity: 0.6;
        }

        @keyframes floatHeart {
            0% { transform: translateY(100vh) rotate(0deg) scale(1); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100px) rotate(360deg) scale(0.5); opacity: 0; }
        }

        .content {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.6rem;
            text-align: center;
            text-shadow: 2px 2px 8px rgba(255, 50, 100, 0.5);
            color: #ffccd5;
            line-height: 1.3;
        }

        .subtitulo {
            font-size: 1rem;
            color: #ff8fa3;
            margin-bottom: 25px;
            text-align: center;
            font-style: italic;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        /* OPCIONES - Grid ordenado */
        .opciones {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
        }

        .opcion {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 100, 150, 0.15);
            border: 1px solid rgba(255, 150, 180, 0.3);
            padding: 10px 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s, border-color 0.3s;
        }

        .opcion:hover {
            background: rgba(255, 100, 150, 0.3);
            border-color: rgba(255, 150, 180, 0.5);
        }

        .opcion input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #ff2d55;
            flex-shrink: 0;
        }

        .opcion label {
            cursor: pointer;
            font-size: 0.85rem;
            color: #ffd6e0;
            line-height: 1.2;
        }

        /* RULETA */
        .wheel-container {
            position: relative;
            width: min(85vw, 380px);
            height: min(85vw, 380px);
        }

        canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 100, 150, 0.4), 0 0 80px rgba(255, 50, 100, 0.2);
        }

        .pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 13px solid transparent;
            border-right: 13px solid transparent;
            border-top: 30px solid #ff2d55;
            filter: drop-shadow(0 2px 8px rgba(255, 45, 85, 0.8));
            z-index: 10;
        }

        .btn-girar {
            padding: 14px 45px;
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, #ff2d55, #ff6b8a);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 20px rgba(255, 45, 85, 0.5);
            letter-spacing: 1px;
        }

        .btn-girar:hover {
            transform: scale(1.08);
            box-shadow: 0 8px 30px rgba(255, 45, 85, 0.7);
        }

        .btn-girar:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .resultado {
            display: none;
        }

        /* CELEBRACION */
        .celebracion-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            pointer-events: none;
        }

        .celebracion-overlay.activa {
            display: block;
        }

        .burbuja-resultado {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: radial-gradient(ellipse at center, #4a0e2e, #2d0a0a);
            border: 3px solid #ff6b8a;
            border-radius: 25px;
            padding: 30px 25px;
            text-align: center;
            z-index: 1001;
            box-shadow: 0 0 60px rgba(255, 100, 150, 0.6), 0 0 120px rgba(255, 50, 100, 0.3);
            animation: aparecerBurbuja 0.6s ease forwards;
            pointer-events: auto;
            width: 90vw;
            max-width: 420px;
        }

        .burbuja-resultado.visible {
            display: block;
        }

        @keyframes aparecerBurbuja {
            0% { transform: translate(-50%, -50%) scale(0) rotate(-5deg); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.05) rotate(1deg); }
            100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
        }

        .burbuja-resultado h2 {
            font-size: 1.4rem;
            color: #ffccd5;
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(255, 100, 150, 0.5);
        }

        .burbuja-resultado .destino-nombre {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff6b8a;
            text-shadow: 0 0 20px rgba(255, 107, 138, 0.8);
            margin: 12px 0;
        }

        .burbuja-resultado .mensaje-amor {
            font-size: 1rem;
            color: #ffd6e0;
            font-style: italic;
            margin-top: 12px;
            line-height: 1.6;
        }

        .burbuja-resultado .cerrar-btn {
            margin-top: 20px;
            padding: 12px 35px;
            background: linear-gradient(135deg, #ff2d55, #ff6b8a);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .burbuja-resultado .cerrar-btn:hover {
            transform: scale(1.05);
        }

        /* Serpentinas */
        .serpentina {
            position: fixed;
            width: 10px;
            height: 30px;
            z-index: 1000;
            animation: caerSerpentina linear forwards;
            border-radius: 3px;
        }

        @keyframes caerSerpentina {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            25% { transform: translateY(25vh) rotate(180deg); }
            50% { transform: translateY(50vh) rotate(360deg); }
            75% { transform: translateY(75vh) rotate(540deg); }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        .corazon-explosion {
            position: fixed;
            font-size: 25px;
            z-index: 1000;
            pointer-events: none;
            animation: explotarCorazon ease-out forwards;
        }

        @keyframes explotarCorazon {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            50% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg); }
            100% { transform: translate(var(--tx2), var(--ty2)) scale(0.5) rotate(360deg); opacity: 0; }
        }

        .burbuja-corazon {
            position: fixed;
            font-size: 30px;
            z-index: 1000;
            pointer-events: none;
            animation: subirBurbuja ease-out forwards;
        }

        @keyframes subirBurbuja {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            20% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-200px) scale(0.3); opacity: 0; }
        }

        /* RESPONSIVE */
        @media (min-width: 768px) {
            h1 { font-size: 2.2rem; }
            .opciones {
                grid-template-columns: 1fr 1fr 1fr;
                max-width: 500px;
            }
            .opcion label { font-size: 0.95rem; }
            .burbuja-resultado h2 { font-size: 1.8rem; }
            .burbuja-resultado .destino-nombre { font-size: 2.2rem; }
        }

        @media (max-width: 380px) {
            h1 { font-size: 1.3rem; }
            .opciones {
                grid-template-columns: 1fr;
            }
            .opcion label { font-size: 0.9rem; }
            .burbuja-resultado { padding: 20px 15px; }
            .burbuja-resultado .destino-nombre { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="hearts-bg" id="heartsBg"></div>
    <div class="celebracion-overlay" id="celebracionOverlay"></div>
    <div class="burbuja-resultado" id="burbujaResultado"></div>

    <div class="content">
        <h1>💕 ¿A dónde iré con mi niña bonita el viernes 17 de julio? 💕</h1>
        <p class="subtitulo">~ Deja que el destino decida nuestra aventura ~</p>

        <div class="container">
            <div class="opciones" id="opciones"></div>

            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="ruleta" width="400" height="400"></canvas>
            </div>

            <button class="btn-girar" id="btnGirar" onclick="girarRuleta()">💖 ¡GIRAR! 💖</button>

            <div class="resultado" id="resultado"></div>
        </div>
    </div>

    <script>
        const mensajesRomanticos = {
            "Lunahuaná, Cañete": [
                "¡Aventura y amor entre los ríos! 🌊💕",
                "Rafting, buen vino y tu mejor compañía... ¡qué más pedir!",
                "Lunahuaná los espera con atardeceres mágicos 🌅"
            ],
            "Islas Ballestas, Pisco": [
                "¡Mar, brisa y amor! Los lobos marinos serán testigos 🦭💕",
                "Una aventura en el mar con tu persona favorita ⛵",
                "Pisco sour y atardeceres frente al mar... romántico total 🌊"
            ],
            "La Oroya": [
                "¡Montañas y aire fresco para los dos! 🏔️💕",
                "La sierra los espera con paisajes inolvidables",
                "Frío afuera, calorcito entre ustedes dos ❄️🔥"
            ],
            "Marcona": [
                "¡Playa, pingüinos y amor! 🐧💕",
                "Arena, sol y la mejor compañía en Marcona",
                "Un paraíso escondido para los dos 🏖️"
            ],
            "Ica": [
                "¡Dunas, oasis y romance en Ica! 🏜️💕",
                "Sandboard de día, estrellas de noche... juntos ✨",
                "Huacachina los espera con magia y atardeceres dorados 🌅"
            ]
        };

        function crearCorazones() {
            const contenedor = document.getElementById("heartsBg");
            const corazones = ["💕", "💖", "💗", "💓", "💘", "💝", "❤️", "🩷", "♥"];
            for (let i = 0; i < 30; i++) {
                const heart = document.createElement("span");
                heart.className = "heart";
                heart.textContent = corazones[Math.floor(Math.random() * corazones.length)];
                heart.style.left = Math.random() * 100 + "%";
                heart.style.fontSize = (14 + Math.random() * 20) + "px";
                heart.style.animationDuration = (8 + Math.random() * 12) + "s";
                heart.style.animationDelay = (Math.random() * 15) + "s";
                contenedor.appendChild(heart);
            }
        }

        const destinos = [
            { nombre: "Lunahuaná, Cañete", color: "#e74c3c" },
            { nombre: "Islas Ballestas, Pisco", color: "#c0392b" },
            { nombre: "La Oroya", color: "#d63384" },
            { nombre: "Marcona", color: "#e91e63" },
            { nombre: "Ica", color: "#9b59b6" }
        ];

        let destinosActivos = [...destinos];
        let girando = false;
        let anguloActual = 0;

        const canvas = document.getElementById("ruleta");
        const ctx = canvas.getContext("2d");
        const btnGirar = document.getElementById("btnGirar");
        const resultadoDiv = document.getElementById("resultado");

        function crearOpciones() {
            const contenedor = document.getElementById("opciones");
            contenedor.innerHTML = "";
            destinos.forEach((destino, i) => {
                const div = document.createElement("div");
                div.className = "opcion";
                div.innerHTML = `
                    <input type="checkbox" id="chk${i}" checked onchange="actualizarDestinos()">
                    <label for="chk${i}">💗 ${destino.nombre}</label>
                `;
                contenedor.appendChild(div);
            });
        }

        function actualizarDestinos() {
            destinosActivos = [];
            destinos.forEach((destino, i) => {
                if (document.getElementById(`chk${i}`).checked) {
                    destinosActivos.push(destino);
                }
            });
            dibujarRuleta();
        }

        function dibujarRuleta() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radio = canvas.width / 2 - 10;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (destinosActivos.length === 0) {
                ctx.fillStyle = "#333";
                ctx.beginPath();
                ctx.arc(centerX, centerY, radio, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#fff";
                ctx.font = "16px Segoe UI";
                ctx.textAlign = "center";
                ctx.fillText("Selecciona al menos un destino", centerX, centerY);
                return;
            }

            const anguloPorSeccion = (Math.PI * 2) / destinosActivos.length;

            destinosActivos.forEach((destino, i) => {
                const anguloInicio = anguloActual + i * anguloPorSeccion;
                const anguloFin = anguloInicio + anguloPorSeccion;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radio, anguloInicio, anguloFin);
                ctx.closePath();

                const grad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, radio);
                grad.addColorStop(0, "#ff6b8a");
                grad.addColorStop(1, destino.color);
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.strokeStyle = "rgba(255, 255, 255, 0.6)";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(anguloInicio + anguloPorSeccion / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "#fff";
                ctx.font = "bold 12px Segoe UI";
                ctx.shadowColor = "rgba(0,0,0,0.7)";
                ctx.shadowBlur = 4;
                ctx.fillText(destino.nombre, radio - 18, 5);
                ctx.restore();
            });

            ctx.beginPath();
            ctx.arc(centerX, centerY, 22, 0, Math.PI * 2);
            const cg = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 22);
            cg.addColorStop(0, "#ff6b8a");
            cg.addColorStop(1, "#c0392b");
            ctx.fillStyle = cg;
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.font = "16px serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#fff";
            ctx.fillText("💖", centerX, centerY);
        }

        function lanzarSerpentinas() {
            const colores = ["#ff2d55", "#ff6b8a", "#ffccd5", "#ff8fa3", "#ffd6e0", "#c0392b", "#9b59b6", "#f39c12"];
            const overlay = document.getElementById("celebracionOverlay");
            overlay.classList.add("activa");

            for (let i = 0; i < 60; i++) {
                setTimeout(() => {
                    const s = document.createElement("div");
                    s.className = "serpentina";
                    s.style.left = Math.random() * 100 + "%";
                    s.style.backgroundColor = colores[Math.floor(Math.random() * colores.length)];
                    s.style.animationDuration = (2 + Math.random() * 3) + "s";
                    s.style.width = (6 + Math.random() * 8) + "px";
                    s.style.height = (18 + Math.random() * 18) + "px";
                    s.style.borderRadius = Math.random() > 0.5 ? "50%" : "3px";
                    overlay.appendChild(s);
                    setTimeout(() => s.remove(), 5000);
                }, i * 50);
            }
            setTimeout(() => overlay.classList.remove("activa"), 6000);
        }

        function lanzarCorazonesExplosion() {
            const corazones = ["💖", "💕", "💗", "💓", "💘", "💝", "❤️", "🩷"];
            const cx = window.innerWidth / 2;
            const cy = window.innerHeight / 2;

            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    const c = document.createElement("span");
                    c.className = "corazon-explosion";
                    c.textContent = corazones[Math.floor(Math.random() * corazones.length)];
                    c.style.left = cx + "px";
                    c.style.top = cy + "px";
                    c.style.fontSize = (18 + Math.random() * 25) + "px";

                    const angulo = (Math.PI * 2 * i) / 20;
                    const dist = 120 + Math.random() * 150;
                    c.style.setProperty("--tx", Math.cos(angulo) * dist + "px");
                    c.style.setProperty("--ty", Math.sin(angulo) * dist + "px");
                    c.style.setProperty("--tx2", Math.cos(angulo) * (dist + 80) + "px");
                    c.style.setProperty("--ty2", Math.sin(angulo) * (dist + 120) + "px");
                    c.style.animationDuration = (1.5 + Math.random()) + "s";

                    document.body.appendChild(c);
                    setTimeout(() => c.remove(), 3000);
                }, i * 60);
            }
        }

        function lanzarBurbujasCorazones() {
            const corazones = ["💖", "💕", "💗", "💓", "🩷"];
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const b = document.createElement("span");
                    b.className = "burbuja-corazon";
                    b.textContent = corazones[Math.floor(Math.random() * corazones.length)];
                    b.style.left = (15 + Math.random() * 70) + "%";
                    b.style.top = (50 + Math.random() * 40) + "%";
                    b.style.fontSize = (18 + Math.random() * 22) + "px";
                    b.style.animationDuration = (2 + Math.random() * 2) + "s";
                    document.body.appendChild(b);
                    setTimeout(() => b.remove(), 4000);
                }, i * 150);
            }
        }

        function mostrarBurbujaResultado(ganador) {
            const mensajes = mensajesRomanticos[ganador.nombre] || ["¡Será un viaje increíble juntos! 💕"];
            const msg = mensajes[Math.floor(Math.random() * mensajes.length)];

            const burbuja = document.getElementById("burbujaResultado");
            burbuja.innerHTML = `
                <h2>💘 ¡El destino ha hablado! 💘</h2>
                <div class="destino-nombre">✨ ${ganador.nombre} ✨</div>
                <div class="mensaje-amor">
                    ${msg}<br><br>
                    🥰 ¡Prepárate mi amor, este viernes 17 de julio<br>
                    nos vamos a <strong>${ganador.nombre}</strong>! 💕<br><br>
                    ~ Tu futuro amorcito y tú vivirán algo inolvidable ~
                </div>
                <button class="cerrar-btn" onclick="cerrarCelebracion()">💖 ¡Vamos mi amor! 💖</button>
            `;
            burbuja.classList.add("visible");
        }

        function cerrarCelebracion() {
            const burbuja = document.getElementById("burbujaResultado");
            burbuja.classList.remove("visible");
            burbuja.style.display = "none";
            setTimeout(() => { burbuja.style.display = ""; }, 500);
        }

        function celebrar(ganador) {
            lanzarSerpentinas();
            lanzarCorazonesExplosion();
            setTimeout(() => lanzarBurbujasCorazones(), 500);
            setTimeout(() => mostrarBurbujaResultado(ganador), 800);
        }

        function girarRuleta() {
            if (girando || destinosActivos.length < 2) {
                if (destinosActivos.length < 2) alert("Selecciona al menos 2 destinos 💕");
                return;
            }

            girando = true;
            btnGirar.disabled = true;

            const vueltas = 5 + Math.random() * 5;
            const anguloFinal = vueltas * Math.PI * 2 + Math.random() * Math.PI * 2;
            const duracion = 4000;
            const inicio = performance.now();
            const anguloInicial = anguloActual;

            function animar(timestamp) {
                const progreso = Math.min((timestamp - inicio) / duracion, 1);
                const ease = 1 - Math.pow(1 - progreso, 3);
                anguloActual = anguloInicial + anguloFinal * ease;
                dibujarRuleta();

                if (progreso < 1) {
                    requestAnimationFrame(animar);
                } else {
                    girando = false;
                    btnGirar.disabled = false;
                    mostrarResultado();
                }
            }
            requestAnimationFrame(animar);
        }

        function mostrarResultado() {
            const anguloPorSeccion = (Math.PI * 2) / destinosActivos.length;
            const anguloNorm = (((-anguloActual - Math.PI / 2) % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const indice = Math.floor(anguloNorm / anguloPorSeccion);
            const ganador = destinosActivos[indice];
            setTimeout(() => celebrar(ganador), 300);
        }

        // Inicializar
        crearCorazones();
        crearOpciones();
        dibujarRuleta();
    </script>
</body>
</html>
